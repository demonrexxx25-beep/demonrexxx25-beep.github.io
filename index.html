<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNsentierz | PvP Tiers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>SNsentierz</h1>
    <p>Competitive Minecraft PvP Rankings</p>
  </header>

  <nav>
    <button onclick="showTab('tiers')">Tier List</button>
    <button onclick="showTab('ranks')">Rankings</button>
    <button onclick="showTab('rules')">Rules</button>
  </nav>

  <main>
    <section id="tiers" class="tab active">
      <h2>S-Tier</h2>
      <div class="card glow">Player1</div>
      <div class="card glow">Player2</div>

      <h2>A-Tier</h2>
      <div class="card">Player3</div>
      <div class="card">Player4</div>
    </section>

    <section id="ranks" class="tab">
      <h2>Top Players</h2>
      <ol>
        <li>Player1 – 1820 ELO</li>
        <li>Player2 – 1760 ELO</li>
        <li>Player3 – 1690 ELO</li>
      </ol>
    </section>

    <section id="rules" class="tab">
      <h2>Rules</h2>
      <ul>
        <li>No cheating or macros</li>
        <li>All fights must be recorded</li>
        <li>Staff decisions are final</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>© 2026 SNsentierz</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
